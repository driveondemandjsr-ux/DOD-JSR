<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveOnDemandJSR | Cab & Driver Services</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="logo">DriveOnDemandJSR</div>
</header>

<div class="hero">
  <div class="hero-text">
    <h1>DriveOnDemandJSR</h1>
    <p>Cab & Driver Services in Jamshedpur</p>
  </div>
</div>

<div class="section">
<h2>Cab Booking</h2>
<div class="card-container">
  <div class="card">
    <img src="images/swift-dzire.png" alt="Swift Dzire">
    <div class="card-content">
      <h3>Swift Dzire</h3>
      <p>Starting ₹1000</p>
      <button onclick="openForm('Swift Dzire Cab')">Book</button>
    </div>
  </div>
  <div class="card">
    <img src="images/ertiga.png" alt="Ertiga">
    <div class="card-content">
      <h3>Ertiga</h3>
      <p>Starting ₹1200</p>
      <button onclick="openForm('Ertiga Cab')">Book</button>
    </div>
  </div>
</div>
</div>

<div class="section">
<h2>Driver Services</h2>
<div class="card-container">
  <div class="card">
    <img src="images/driver.png" alt="2 Hours Driver">
    <div class="card-content">
      <h3>2 Hours Local</h3>
      <p>₹249</p>
      <button onclick="openForm('2 Hours Driver')">Book</button>
    </div>
  </div>
  <div class="card">
    <img src="images/driver.png" alt="Outstation Driver">
    <div class="card-content">
      <h3>Outstation</h3>
      <p>₹1000 / Day</p>
      <button onclick="openForm('Outstation Driver')">Book</button>
    </div>
  </div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
